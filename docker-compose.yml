services:
  nextjs-app:
    build:
      context: .
    container_name: nextjs-app
    ports:
      - "3000:3000"
    environment:
      APP_NAME: Muungano
      KES_USD_RATE: "0.00775"
      MWK_USD_RATE: "0.00058"
      MWK_KES_RATE: "0.013"
      RAFIKI_MOCK_MODE: "true"
      RAFIKI_SENDER_BASE_URL: http://rafiki-node-malawi:3000
      RAFIKI_RECEIVER_BASE_URL: http://rafiki-node-kenya:3000
      ILP_DOMAIN: g.muungano
      DATABASE_URL: postgres://muungano:muungano@postgres:5432/muungano
      REDIS_URL: redis://redis:6379
      MPESA_SERVICE_URL: http://muungano-mpesa-simulator:4101
      BANK_SERVICE_URL: http://muungano-bank-simulator:4102
    depends_on:
      - postgres
      - redis
      - rafiki-node-malawi
      - rafiki-node-kenya
      - ilp-connector
      - muungano-mpesa-simulator
      - muungano-bank-simulator

  rafiki-node-malawi:
    image: node:20-alpine
    container_name: rafiki-node-malawi
    command: ["sh", "-c", "echo 'rafiki malawi node running' && sleep infinity"]

  rafiki-node-kenya:
    image: node:20-alpine
    container_name: rafiki-node-kenya
    command: ["sh", "-c", "echo 'rafiki kenya node running' && sleep infinity"]

  ilp-connector:
    image: node:20-alpine
    container_name: ilp-connector
    command: ["sh", "-c", "echo 'ilp connector running' && sleep infinity"]

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: muungano
      POSTGRES_USER: muungano
      POSTGRES_PASSWORD: muungano
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"

  muungano-mpesa-simulator:
    build:
      context: ./simulators/mpesa-service
    container_name: muungano-mpesa-simulator
    environment:
      DATABASE_URL: postgres://muungano:muungano@postgres:5432/muungano
      SERVICE_NAME: mpesa
    ports:
      - "4101:4101"
    depends_on:
      - postgres

  muungano-bank-simulator:
    build:
      context: ./simulators/bank-service
    container_name: muungano-bank-simulator
    environment:
      DATABASE_URL: postgres://muungano:muungano@postgres:5432/muungano
      SERVICE_NAME: bank
    ports:
      - "4102:4102"
    depends_on:
      - postgres

volumes:
  postgres_data:
