services:
  nextjs-app:
    build:
      context: .
    container_name: nextjs-app
    ports:
      - "3000:3000"
    environment:
      APP_NAME: Muungano
      MWK_TO_KES_RATE: 0.013
      RAFIKI_MOCK_MODE: "true"
      RAFIKI_SENDER_BASE_URL: http://rafiki-node-malawi:3000
      RAFIKI_RECEIVER_BASE_URL: http://rafiki-node-kenya:3000
      DATABASE_URL: postgres://muungano:muungano@postgres:5432/muungano
      REDIS_URL: redis://redis:6379
      MPESA_SERVICE_URL: http://mpesa-service:4101
      BANK_SERVICE_URL: http://bank-service:4102
      SACCO_SERVICE_URL: http://sacco-service:4103
      INSURANCE_SERVICE_URL: http://insurance-service:4104
    depends_on:
      - postgres
      - redis
      - rafiki-node-malawi
      - rafiki-node-kenya
      - ilp-connector
      - mpesa-service
      - bank-service
      - sacco-service
      - insurance-service

  rafiki-node-malawi:
    image: node:20-alpine
    container_name: rafiki-node-malawi
    command: ["sh", "-c", "echo 'rafiki malawi node running' && sleep infinity"]

  rafiki-node-kenya:
    image: node:20-alpine
    container_name: rafiki-node-kenya
    command: ["sh", "-c", "echo 'rafiki kenya node running' && sleep infinity"]

  ilp-connector:
    image: node:20-alpine
    container_name: ilp-connector
    command: ["sh", "-c", "echo 'ilp connector running' && sleep infinity"]

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_DB: muungano
      POSTGRES_USER: muungano
      POSTGRES_PASSWORD: muungano
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"

  mpesa-service:
    build:
      context: ./simulators/mpesa-service
    container_name: mpesa-service
    ports:
      - "4101:4101"

  bank-service:
    build:
      context: ./simulators/bank-service
    container_name: bank-service
    ports:
      - "4102:4102"

  sacco-service:
    build:
      context: ./simulators/sacco-service
    container_name: sacco-service
    ports:
      - "4103:4103"

  insurance-service:
    build:
      context: ./simulators/insurance-service
    container_name: insurance-service
    ports:
      - "4104:4104"

volumes:
  postgres_data:
